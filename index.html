<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fila Virtual (Online)</title>
    
    <script>
      const savedTheme = localStorage.getItem('appTheme') || 'theme-indigo';
      document.documentElement.classList.add(savedTheme);
      // Forçar modo escuro como padrão (Design Premium das suas Prints)
      const savedDarkMode = localStorage.getItem('appDarkMode');
      if (savedDarkMode === 'false') { document.documentElement.classList.remove('dark'); } 
      else { document.documentElement.classList.add('dark'); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { extend: { colors: { primary: { 100: 'var(--primary-100)', 400: 'var(--primary-400)', 500: 'var(--primary-500)', 600: 'var(--primary-600)' } } } }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root { --primary-100: #e0e7ff; --primary-400: #818cf8; --primary-500: #6366f1; --primary-600: #4f46e5; }
      html.theme-emerald { --primary-100: #d1fae5; --primary-400: #34d399; --primary-500: #10b981; --primary-600: #059669; }
      html.theme-rose { --primary-100: #ffe4e6; --primary-400: #fb7185; --primary-500: #f43f5e; --primary-600: #e11d48; }
      html.theme-amber { --primary-100: #fef3c7; --primary-400: #fbbf24; --primary-500: #f59e0b; --primary-600: #d97706; }
      html.theme-violet { --primary-100: #ede9fe; --primary-400: #a78bfa; --primary-500: #8b5cf6; --primary-600: #7c3aed; }

      body { 
        font-family: "Inter", sans-serif; 
        background-color: #f8fafc; 
        color: #0f172a; 
      }
      
      /* Fundo Azul Escuro Oficial das Imagens */
      .dark body { 
        background: linear-gradient(160deg, #1e1b4b 0%, #0f172a 40%, #020617 100%);
        background-attachment: fixed;
        color: #f8fafc; 
      }

      .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.39, 0.575, 0.565, 1) both; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

      /* Estilo de Cartões das Prints (bg-slate-800) */
      .card-style { background-color: #ffffff; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
      .dark .card-style { background-color: #1e293b; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.05); }
      
      /* Estilo de Inputs das Prints (bg-slate-900) */
      .input-style { background-color: #f1f5f9; color: #0f172a; border-radius: 0.75rem; padding: 0.875rem 1rem; width: 100%; outline: none; border: 1px solid #cbd5e1; transition: border-color 0.2s; }
      .dark .input-style { background-color: #0f172a; color: white; border: 1px solid #334155; }
      .input-style:focus { border-color: var(--primary-500); }

      #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-weight: 600; color: white; z-index: 99999; transition: all 0.4s ease; text-align: center; width: max-content; max-w: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
      #toast.show { top: 20px; }
      #toast.success { background: #10b981; }
      #toast.error { background: #ef4444; }
      #toast.info { background: var(--primary-500); }

      .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
      
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--primary-500); border-radius: 10px; }
      
      button { transition: all 0.2s ease; }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body class="antialiased min-h-screen">

    <!-- TELA DE CARREGAMENTO SEGURO (NUNCA TRAVA O APP) -->
    <div id="loading-section" class="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-50 dark:bg-[#0f172a] transition-opacity duration-300">
      <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-primary-500"></div>
    </div>

    <div id="app-container" class="container mx-auto max-w-md pb-32 pt-6 px-4">
      <div id="toast"></div>

      <!-- TELA DE AUTENTICAÇÃO (Design Idêntico à Print 1) -->
      <div id="auth-overlay" class="hidden flex-col items-center justify-center min-h-[80vh] py-4">
        <div id="auth-section" class="w-full card-style fade-in-up">
          
          <div class="flex border-b border-slate-300 dark:border-slate-700 mb-6">
            <button type="button" id="show-login-tab" class="flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500">Entrar</button>
            <button type="button" id="show-register-tab" class="flex-1 pb-3 text-center font-bold text-slate-500 dark:text-slate-400 border-b-2 border-transparent">Registrar</button>
          </div>

          <!-- Formulário Login -->
          <div id="login-form" class="fade-in-up">
            <input type="email" id="loginEmail" placeholder="E-mail" class="input-style mb-4" autocomplete="email" />
            <div class="relative mb-6 w-full">
              <input type="password" id="loginPassword" placeholder="Palavra-passe" class="input-style pr-12" autocomplete="current-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-primary-500 toggle-password-btn" data-target="loginPassword">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="eye-icon"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <button type="button" id="login-btn" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Entrar</button>
            <button type="button" id="forgot-password-link" class="w-full text-center mt-5 text-sm text-primary-500 hover:underline">Esqueceu a senha?</button>
          </div>

          <!-- Formulário Registo -->
          <div id="register-form" class="hidden">
            <input type="email" id="registerEmail" placeholder="E-mail" class="input-style mb-4" autocomplete="email" />
            <input type="tel" id="registerPhone" placeholder="Celular (Opcional)" class="input-style mb-4" autocomplete="tel" />
            <div class="relative mb-4 w-full">
              <input type="password" id="registerPassword" placeholder="Senha (mín. 6)" class="input-style pr-12" autocomplete="new-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 toggle-password-btn" data-target="registerPassword">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <div class="relative mb-6 w-full">
              <input type="password" id="registerPasswordConfirm" placeholder="Confirmar Senha" class="input-style pr-12" autocomplete="new-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 toggle-password-btn" data-target="registerPasswordConfirm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <button type="button" id="register-btn" class="w-full bg-[#10b981] hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Criar Conta</button>
          </div>
        </div>
      </div>

      <!-- TELA MINHAS FILAS (Design Print 6) -->
      <div id="queue-selection-screen" class="hidden space-y-6 fade-in-up">
        <div class="mx-auto w-max card-style px-6 py-3 rounded-full flex-col items-center justify-center text-center">
            <div class="text-[10px] uppercase tracking-widest text-primary-500 font-bold mb-0.5 flex items-center justify-center gap-1.5">
                <span id="sync-indicator-home" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                Horário de Brasília
            </div>
            <div id="server-clock-display-home" class="text-2xl font-mono font-bold text-slate-900 dark:text-white">--:--:--</div>
        </div>

        <h1 class="text-3xl font-bold text-center text-slate-900 dark:text-white mb-4">Minhas Filas</h1>
        
        <div id="queues-list" class="space-y-4"></div>
        
        <div class="space-y-4 pt-6 border-t border-slate-300 dark:border-slate-800">
          <button type="button" id="join-new-queue-btn" class="w-full bg-slate-200 dark:bg-slate-800 text-slate-800 dark:text-white font-bold py-4 rounded-xl shadow-md hover:brightness-110 border border-slate-300 dark:border-slate-700">Entrar por Código</button>
          <button type="button" id="create-new-queue-btn" class="hidden w-full bg-primary-500 text-white font-bold py-4 rounded-xl shadow-md">Criar Fila</button>
          <button type="button" id="main-logout-btn" class="w-full text-center text-sm text-red-500 font-bold hover:underline py-3">Sair da Conta</button>
        </div>
      </div>

      <!-- CONTEÚDO DA FILA -->
      <div id="main-content" class="hidden space-y-5 fade-in-up">
        
        <header class="flex justify-between items-center relative z-20">
          <div>
            <button type="button" id="back-to-selection-btn" class="flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-primary-500 mb-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg> Voltar
            </button>
            <h1 id="header-queue-name" class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Fila</h1>
          </div>
          <div class="flex items-center gap-3">
            <button type="button" id="edit-profile-btn" class="text-slate-400 hover:text-primary-500 p-2 bg-white dark:bg-slate-800 rounded-full shadow-sm border border-slate-200 dark:border-slate-700">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <img id="header-user-avatar" class="w-12 h-12 rounded-full object-cover border-2 border-primary-500 shadow-md" />
            <button type="button" id="header-leave-queue-btn" class="hidden bg-red-500 text-white font-bold py-2 px-4 rounded-xl text-sm">Sair</button>
          </div>
        </header>

        <!-- Relógio da Fila -->
        <div class="mx-auto w-max card-style px-6 py-3 rounded-full flex-col items-center justify-center text-center mt-2 mb-6">
            <div class="text-[10px] uppercase tracking-widest text-primary-500 font-bold mb-0.5 flex items-center justify-center gap-1.5">
                <span id="sync-indicator-queue" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></span>
                Horário de Brasília
            </div>
            <div id="server-clock-display-queue" class="text-2xl font-mono font-bold text-slate-900 dark:text-white tracking-wider">--:--:--</div>
        </div>

        <!-- Botão Entrar FIXO (Não pula a tela toda, fica apenas aqui) -->
        <button type="button" id="join-queue-action-btn" class="hidden w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-4 rounded-2xl shadow-xl text-xl mb-4">Entrar na Fila</button>

        <!-- Painel Admin (Print 7) -->
        <div id="super-admin-panel" class="hidden card-style space-y-4 border border-amber-500/30">
          <h2 class="text-lg font-bold text-center text-amber-500">Painel Admin</h2>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <input type="time" id="queueOpenTime" class="input-style" />
            <input type="time" id="queueCloseTime" class="input-style" />
          </div>
          <button type="button" id="save-schedule-btn" class="w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 rounded-xl shadow-md">Salvar Horários</button>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" id="restart-queue-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md">Zerar Fila</button>
            <button type="button" id="view-logs-btn" class="bg-slate-600 hover:bg-slate-700 text-white font-bold py-3 rounded-xl shadow-md text-slate-200">Histórico</button>
          </div>
        </div>

        <!-- Painel Motorista -->
        <div id="driver-panel" class="hidden card-style space-y-3 border border-cyan-500/30">
            <h2 class="text-lg font-bold text-center text-cyan-400">Painel do Motorista</h2>
            <button type="button" id="share-location-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3 px-4 rounded-xl shadow-md">Compartilhar Localização</button>
        </div>

        <!-- Cards de Info (Print 7) -->
        <div class="bg-primary-500 text-white p-6 rounded-[2rem] shadow-lg flex justify-between items-center">
          <div>
            <p class="text-primary-100 text-sm font-medium mb-1">Sua Posição</p>
            <p id="user-position" class="text-5xl font-black leading-none">-</p>
          </div>
          <div class="text-right">
            <p class="text-primary-100 text-sm font-medium mb-1">Total na Fila</p>
            <p id="total-in-queue" class="text-4xl font-bold leading-none">0</p>
          </div>
        </div>

        <!-- Chat (Print 4) -->
        <div id="chat-section" class="card-style">
          <h3 class="text-lg font-bold text-center text-slate-900 dark:text-white mb-4">Chat da Fila</h3>
          <div id="chat-messages" class="h-56 overflow-y-auto space-y-4 px-2 mb-4"></div>
          <form id="chat-form" class="flex items-center gap-2 w-full">
            <input type="text" id="chat-input" placeholder="Digite uma mensagem..." class="flex-1 min-w-0 input-style" autocomplete="off" />
            <button type="submit" class="shrink-0 bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 px-4 rounded-xl">Enviar</button>
          </form>
        </div>

        <div id="queue-status-card" class="text-center p-4 rounded-2xl font-bold text-lg border border-slate-300 dark:border-slate-700">
          <p id="queue-status-message"></p>
        </div>

        <!-- Observação (Print 4) -->
        <div id="observation-section" class="hidden card-style space-y-3">
          <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Sua Observação</label>
          <div class="flex items-center gap-2 w-full">
            <input type="text" id="userObservation" placeholder="Ex: Chego em 5 min..." class="flex-1 min-w-0 input-style" />
            <button type="button" id="save-observation-btn" class="shrink-0 bg-[#10b981] hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl">Salvar</button>
          </div>
        </div>

        <!-- Lista da Fila -->
        <div class="space-y-3 pb-16">
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-4 pl-2">Ordem de Chamada</h3>
          <div id="queue-list" class="space-y-3"></div>
        </div>
      </div>
    </div>

    <!-- Modal Editar Perfil -->
    <div id="profile-overlay" class="hidden modal-overlay overflow-y-auto">
        <div class="w-full max-w-md mx-auto card-style space-y-5 fade-in-up">
            <h2 class="text-2xl font-bold text-center text-slate-900 dark:text-white">Perfil</h2>
            
            <div class="flex justify-center relative group cursor-pointer w-max mx-auto" id="profile-pic-container">
                <img id="profile-pic-preview" class="w-24 h-24 rounded-full object-cover border-4 border-slate-200 dark:border-slate-700 shadow-md" />
                <div class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                    <span class="text-white text-[10px] font-bold">MUDAR</span>
                </div>
                <input type="file" id="profile-pic-input" accept="image/*" class="hidden" />
            </div>

            <div class="space-y-4">
              <input type="text" id="userName" placeholder="Nome Completo" class="input-style" />
              <input type="text" id="userCourse" placeholder="Curso / Setor" class="input-style" />
              <input type="tel" id="userProfilePhone" placeholder="Celular (Opcional)" class="input-style" />
            </div>

            <div class="bg-slate-100 dark:bg-[#0f172a] p-4 rounded-2xl space-y-4 border border-slate-200 dark:border-slate-700">
              <p class="text-xs font-bold text-center text-slate-500 uppercase tracking-widest">Tema</p>
              <div class="flex justify-center gap-4">
                <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#6366f1] ring-offset-2 dark:ring-offset-[#0f172a]" data-theme="theme-indigo"></button>
                <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#10b981] ring-offset-2 dark:ring-offset-[#0f172a]" data-theme="theme-emerald"></button>
                <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#f43f5e] ring-offset-2 dark:ring-offset-[#0f172a]" data-theme="theme-rose"></button>
                <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#f59e0b] ring-offset-2 dark:ring-offset-[#0f172a]" data-theme="theme-amber"></button>
                <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#8b5cf6] ring-offset-2 dark:ring-offset-[#0f172a]" data-theme="theme-violet"></button>
              </div>
              <div class="flex justify-center items-center gap-3 pt-2 border-t border-slate-200 dark:border-slate-700">
                <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Claro</span>
                <label class="relative inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="dark-mode-toggle" class="sr-only peer">
                  <div class="w-11 h-6 bg-slate-300 peer-focus:outline-none rounded-full peer dark:bg-slate-600 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-500"></div>
                </label>
                <span class="text-xs font-semibold text-slate-600 dark:text-slate-400">Escuro</span>
              </div>
            </div>

            <div class="pt-2 space-y-2">
              <button type="button" id="save-profile-btn" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Guardar Alterações</button>
              <button type="button" id="close-profile-btn" class="w-full text-slate-500 dark:text-slate-400 font-bold py-2 hover:underline">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal Histórico -->
    <div id="logs-modal" class="hidden modal-overlay flex-col items-center justify-center">
        <div class="w-full max-w-lg card-style space-y-4 fade-in-up flex flex-col max-h-[80vh]">
            <div class="flex justify-between items-center shrink-0 border-b border-slate-300 dark:border-slate-700 pb-3">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Histórico</h2>
                <button type="button" id="close-logs-modal" class="text-slate-400 hover:text-red-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div id="logs-list" class="flex-grow overflow-y-auto space-y-3 pr-2"></div>
        </div>
    </div>

    <!-- Modal Entrar Fila -->
    <div id="join-queue-modal" class="hidden modal-overlay flex-col items-center justify-center">
      <div class="card-style w-full max-w-sm space-y-6 fade-in-up">
        <h3 class="text-xl font-bold text-center text-slate-900 dark:text-white">Entrar na Fila</h3>
        <input type="text" id="queue-code-input" placeholder="CÓDIGO DA FILA" class="input-style text-center tracking-[0.3em] font-mono font-bold uppercase py-4 text-lg" />
        <div class="grid grid-cols-2 gap-3">
          <button type="button" id="cancel-join-queue" class="bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white font-bold py-3 rounded-xl">Cancelar</button>
          <button type="button" id="confirm-join-queue" class="bg-primary-500 text-white font-bold py-3 rounded-xl shadow-lg">Entrar</button>
        </div>
      </div>
    </div>

    <!-- Modal Confirmação -->
    <div id="confirm-modal" class="hidden modal-overlay flex-col items-center justify-center z-[9999]">
      <div class="card-style w-full max-w-sm space-y-5 text-center fade-in-up">
        <h3 class="text-xl font-bold text-slate-900 dark:text-white" id="confirm-modal-title">Atenção</h3>
        <p class="text-sm font-medium text-slate-600 dark:text-slate-400" id="confirm-modal-text">Tem certeza que deseja continuar?</p>
        <div class="grid grid-cols-2 gap-3 pt-4">
          <button type="button" id="cancel-confirm-btn" class="bg-slate-200 dark:bg-slate-700 text-slate-800 dark:text-white font-bold py-3 rounded-xl">Cancelar</button>
          <button type="button" id="accept-confirm-btn" class="bg-red-500 text-white font-bold py-3 rounded-xl shadow-lg hover:bg-red-600">Confirmar</button>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, onSnapshot, query, writeBatch, addDoc, serverTimestamp, getDocs, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDRf7ZciyvbJkX-P5cfWkzfI2Uw11Lxy0Q",
        authDomain: "filaonibus.firebaseapp.com",
        projectId: "filaonibus",
        storageBucket: "filaonibus.appspot.com",
        messagingSenderId: "93496874568",

      document.querySelectorAll('.toggle-password-btn').forEach(btn => {

      async function syncServerTime() {
        try {
            const res = await fetch('https://worldtimeapi.org/api/timezone/America/Sao_Paulo', { cache: 'no-store' });
            if (!res.ok) throw new Error();
            const data = await res.json();
            serverTimeAtFetch = new Date(data.datetime).getTime();
            localPerfAtFetch = performance.now();
            isTimeSynced = true;
            if(el("sync-indicator")) el("sync-indicator").classList.replace("bg-red-500", "bg-green-500");
            if(el("sync-indicator-home")) el("sync-indicator-home").classList.replace("bg-red-500", "bg-green-500");
            if(el("sync-indicator-queue")) el("sync-indicator-queue").classList.replace("bg-red-500", "bg-green-500");
        } catch (e) {
            try {
                const res2 = await fetch('https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo', { cache: 'no-store' });
                if (!res2.ok) throw new Error();
                const data2 = await res2.json();
                serverTimeAtFetch = new Date(data2.dateTime).getTime();
                localPerfAtFetch = performance.now();
                isTimeSynced = true;
                if(el("sync-indicator")) el("sync-indicator").classList.replace("bg-red-500", "bg-green-500");
                if(el("sync-indicator-home")) el("sync-indicator-home").classList.replace("bg-red-500", "bg-green-500");
                if(el("sync-indicator-queue")) el("sync-indicator-queue").classList.replace("bg-red-500", "bg-green-500");
            } catch(e2) {
                console.warn("Usando horário local como backup. (Risco de fraude)");
                serverTimeAtFetch = Date.now();
                localPerfAtFetch = performance.now();
                isTimeSynced = true; 
            }
        }
      }

      function getBrasiliaTime() {
        if (!isTimeSynced) return null;
        const absoluteTime = serverTimeAtFetch + (performance.now() - localPerfAtFetch);
        const dateObj = new Date(absoluteTime);
        const formatter = new Intl.DateTimeFormat('pt-BR', { timeZone: 'America/Sao_Paulo', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
        const parts = formatter.formatToParts(dateObj);
        const t = {}; parts.forEach(p => t[p.type] = p.value);
        let h = parseInt(t.hour); if(h === 24) h = 0;
        return {
            year: parseInt(t.year), month: parseInt(t.month), day: parseInt(t.day), hour: h, minute: parseInt(t.minute), second: parseInt(t.second),
            timestamp: absoluteTime, dateStringBRT: `${t.year}-${t.month}-${t.day}`, timeString: `${String(h).padStart(2, '0')}:${t.minute}:${t.second}`
        };
      }

      function initClock() {
        syncServerTime();
        setInterval(syncServerTime, 60 * 1000); 
        setInterval(() => {
          const brt = getBrasiliaTime();
          if(brt) {
              if (el("server-clock-display")) el("server-clock-display").textContent = brt.timeString;
              if (el("server-clock-display-home")) el("server-clock-display-home").textContent = brt.timeString;
              if (el("server-clock-display-queue")) el("server-clock-display-queue").textContent = brt.timeString;
              if (currentQueueId && currentQueueSettings) updatePeriodicUI(brt);
          }
        }, 1000);
      }
      initClock();

      const themeButtons = document.querySelectorAll('.theme-btn');
      const themeHexMap = { 'theme-indigo': '6366f1', 'theme-emerald': '10b981', 'theme-rose': 'f43f5e', 'theme-amber': 'f59e0b', 'theme-violet': '8b5cf6' };

      function applyThemeSelection(themeName) {
        document.documentElement.classList.remove('theme-indigo', 'theme-emerald', 'theme-rose', 'theme-amber', 'theme-violet');
        document.documentElement.classList.add(themeName);
        localStorage.setItem('appTheme', themeName);
        themeButtons.forEach(btn => {
          if (btn.dataset.theme === themeName) { btn.classList.add('ring-2', 'ring-primary-500', 'scale-110'); } 
          else { btn.classList.remove('ring-2', 'ring-primary-500', 'scale-110'); }
        });
      }
      function getThemeHex() { return themeHexMap[localStorage.getItem('appTheme') || 'theme-indigo'] || '6366f1'; }
      applyThemeSelection(localStorage.getItem('appTheme') || 'theme-indigo');
      themeButtons.forEach(btn => { btn.addEventListener('click', (e) => { e.preventDefault(); applyThemeSelection(btn.dataset.theme); }); });

      const darkModeToggle = el('dark-mode-toggle');
      darkModeToggle.checked = document.documentElement.classList.contains('dark');
      darkModeToggle.addEventListener('change', (e) => {
        if (e.target.checked) { document.documentElement.classList.add('dark'); localStorage.setItem('appDarkMode', 'true'); } 
        else { document.documentElement.classList.remove('dark'); localStorage.setItem('appDarkMode', 'false'); }
      });

      async function checkDailyReset(id, data) {
        const brt = getBrasiliaTime();
        if(!brt) return;
        const today = brt.dateStringBRT;
        if (data.lastResetDate !== today) {
          const members = await getDocs(collection(db, "queues", id, "members"));
          const batch = writeBatch(db);
          members.docs.forEach(d => batch.delete(d.ref));
          batch.update(doc(db, "queues", id), { lastResetDate: today });
          await batch.commit();
          await addDoc(collection(db, "queues", id, "chat"), { text: "Fila reiniciada para o novo dia!", type: "system", timestamp: serverTimestamp() });
        }
      }

      addEvt("profile-pic-container", "click", () => el("profile-pic-input").click());
      addEvt("profile-pic-input", "change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
            const MAX_SIZE = 200; let width = img.width, height = img.height;
            if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } } else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
            canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
            tempPhotoDataUrl = canvas.toDataURL('image/jpeg', 0.8);
            el("profile-pic-preview").src = tempPhotoDataUrl;
          };
          img.src = event.target.result;
        };
        reader.readAsDataURL(file);
      });

      function openProfileModal() {
        tempPhotoDataUrl = null;
        el("userName").value = userProfile?.name || "";
        el("userCourse").value = userProfile?.course || "";
        el("userProfilePhone").value = userProfile?.phone || "";

        el("profile-pic-preview").src = userProfile?.photoUrl || `https://placehold.co/200x200/${getThemeHex()}/ffffff?text=${initial}`;
        showEl("profile-overlay", "flex");
      }

      function showScreen(s) {
        hideEl("auth-overlay");
        hideEl("profile-overlay");
        hideEl("main-content");

        else { showEl("global-clock-widget", "flex"); }
        
        if (s === "auth") { showEl("auth-overlay", "flex"); }
        else if (s === "profile") { showEl("profile-overlay", "flex"); }
        else if (s === "main") { showEl("main-content", "block"); }
        else if (s === "queueSelection") { showEl("queue-selection-screen", "block"); }

      onAuthStateChanged(auth, async (user) => {
        try {
            if (user) {
              currentUser = user;
              const snap = await getDoc(doc(db, "users", user.uid));
              if (snap.exists()) {
                userProfile = { uid: user.uid, ...snap.data() };
                if (userProfile.name) {
                  const lastId = localStorage.getItem("lastQueueId");
                  if (lastId && (userProfile.joinedQueues || []).includes(lastId)) {
                      await enterQueue(lastId);

                      showScreen("queueSelection"); 
                      renderQueueList();

                } else openProfileModal();
              } else {

            showToast("Erro ao carregar dados.", "error");
            showScreen("auth");
        } finally {
            hideEl("loading-section");
        }
      });

      async function enterQueue(id) {
        try {
            showEl("loading-section", "flex");
            const snap = await getDoc(doc(db, "queues", id));
            if (!snap.exists()) {
                showToast("Fila não encontrada", "error");
                showScreen("queueSelection");
                return;
            }
            currentQueueId = id; currentQueueSettings = snap.data();
            await checkDailyReset(id, currentQueueSettings);
            localStorage.setItem("lastQueueId", id);
            el("header-queue-name").textContent = currentQueueSettings.name;
            
            if (unsubMembers) unsubMembers(); if (unsubSettings) unsubSettings(); if (unsubChat) unsubChat();

            unsubMembers = onSnapshot(query(collection(db, "queues", id, "members"), orderBy("timestamp")), (s) => {
              currentQueueMembers = s.docs.map(d => ({...d.data(), uid: d.id}));
              renderQueueView(currentQueueMembers);
              if(getBrasiliaTime()) updatePeriodicUI(getBrasiliaTime());
            });

            unsubSettings = onSnapshot(doc(db, "queues", id), (s) => { 
              if(s.exists()) { currentQueueSettings = s.data(); if(getBrasiliaTime()) updatePeriodicUI(getBrasiliaTime()); }
            });

            unsubChat = onSnapshot(query(collection(db, "queues", id, "chat"), orderBy("timestamp", "desc"), limit(50)), (s) => {
              const msgs = s.docs.map(d => ({...d.data(), id: d.id})).reverse(); renderChat(msgs);
            });

            const initial = userProfile?.name ? userProfile.name.charAt(0).toUpperCase() : "U";
            el("header-user-avatar").src = userProfile?.photoUrl || `https://placehold.co/100x100/${getThemeHex()}/ffffff?text=${initial}`;
            
            if (userProfile.role === "superadmin") { 
                showEl("super-admin-panel", "block");
                el("queueOpenTime").value = currentQueueSettings.openTime || ""; 
                el("queueCloseTime").value = currentQueueSettings.closeTime || ""; 
            } else { hideEl("super-admin-panel"); }

            if (userProfile.role === "driver") { showEl("driver-panel", "block"); } 
            else { hideEl("driver-panel"); }

            showScreen("main");

        } catch(e) {
            console.error("Erro ao entrar na fila:", e);
            showToast("Falha ao abrir", "error");
            showScreen("queueSelection");
        } finally {
            hideEl("loading-section");
        }
      }

      function updatePeriodicUI(brt) {
        if (!currentQueueSettings || currentQueueId === null) {
            hideEl("join-queue-container"); return;
        }
        
        let isOpen = false;
        const card = el("queue-status-card"), msg = el("queue-status-message");

        if (!currentQueueSettings.openTime || !currentQueueSettings.closeTime) {
            msg.textContent = "Agendamento pendente.";
            card.className = "text-center p-4 rounded-2xl bg-slate-200 dark:bg-slate-800 text-slate-600 dark:text-slate-400";
        } else {
            const currentMinutes = brt.hour * 60 + brt.minute;
            const [oh, om] = currentQueueSettings.openTime.split(":").map(Number);
            const [ch, cm] = currentQueueSettings.closeTime.split(":").map(Number);
            const openMinutes = oh * 60 + om; const closeMinutes = ch * 60 + cm;

            if (currentMinutes < openMinutes) {
                msg.textContent = `Fila fechada. Abre às ${currentQueueSettings.openTime}`;
                card.className = "text-center p-4 rounded-2xl border border-sky-500/30 bg-sky-100 dark:bg-sky-500/20 text-sky-700 dark:text-sky-400";
            } else if (currentMinutes >= openMinutes && currentMinutes < closeMinutes) {
                isOpen = true;
                msg.textContent = `Fila aberta! Fecha às ${currentQueueSettings.closeTime}`;
                card.className = "text-center p-4 rounded-2xl border border-green-500/30 bg-green-100 dark:bg-green-500/20 text-green-700 dark:text-green-400";
            } else {
                msg.textContent = "A fila foi encerrada por hoje.";
                card.className = "text-center p-4 rounded-2xl border border-red-500/30 bg-red-100 dark:bg-red-500/20 text-red-700 dark:text-red-400";
            }
        }

        const idx = currentQueueMembers.findIndex(m => m.uid === currentUser?.uid);
        const isIn = idx !== -1;

        if (!isIn && isOpen) {
            showEl("join-queue-container", "block");
        } else { 
            hideEl("join-queue-container"); 
        }
      }

      async function handleMoveInQueue(uid, direction) {
        const queue = [...currentQueueMembers];
        const userIndex = queue.findIndex(u => u.uid === uid);
        if (userIndex === -1) return;
        let swapIndex;
        if (direction === "up" && userIndex > 0) swapIndex = userIndex - 1;
        else if (direction === "down" && userIndex < queue.length - 1) swapIndex = userIndex + 1;
        else return;

        const userToMove = queue[userIndex];
        const userToSwapWith = queue[swapIndex];
        const batch = writeBatch(db);
        batch.update(doc(db, "queues", currentQueueId, "members", userToMove.uid), { timestamp: userToSwapWith.timestamp });
        batch.update(doc(db, "queues", currentQueueId, "members", userToSwapWith.uid), { timestamp: userToMove.timestamp });

        try { await batch.commit(); } catch(e) {}
      }

      function renderQueueView(members) {
        const idx = members.findIndex(m => m.uid === currentUser.uid);
        const isIn = idx !== -1;
        el("user-position").textContent = isIn ? idx + 1 : "-";
        el("total-in-queue").textContent = members.length;
        
        if (isIn) {
          showEl("header-leave-queue-btn", "block");
        } else {
          hideEl("header-leave-queue-btn");
        }

        el("queue-list").innerHTML = members.length === 0 
          ? `<div class="text-center text-slate-500 py-8 font-medium">A fila está vazia.</div>` 
          : members.map((m, i) => {
          const avatar = m.photoUrl || `https://placehold.co/100x100/${getThemeHex()}/ffffff?text=${m.name ? m.name.charAt(0).toUpperCase() : "U"}`;
          const borderClass = m.uid === currentUser.uid ? 'border-2 border-primary-500 shadow-md' : 'border border-transparent';
          
          let adminControlsHTML = "";
          if (userProfile.role === "superadmin" && m.uid !== currentUser.uid) {
            adminControlsHTML = `
                <div class="flex-shrink-0 flex gap-2 items-center ml-2">

                    <button class="delete-queue-btn bg-red-100 dark:bg-red-900/40 w-8 h-8 rounded-lg text-red-600 hover:text-red-400 flex items-center justify-center transition-colors" data-uid="${m.uid}" data-name="${m.name}">✕</button>
                    <button class="move-queue-btn bg-slate-200 dark:bg-slate-700 w-8 h-8 rounded-lg text-slate-600 dark:text-slate-400 hover:text-white flex items-center justify-center transition-colors" data-uid="${m.uid}" data-direction="down">▼</button>
                </div>`;
          }

          return `
          <div class="card-style flex items-center gap-3 ${borderClass} mb-3 py-3 px-4">
            <div class="bg-slate-100 dark:bg-slate-700/50 w-12 h-12 rounded-xl flex items-center justify-center font-bold text-lg flex-shrink-0 text-slate-800 dark:text-white">${i+1}</div>
            <img src="${avatar}" class="w-12 h-12 rounded-full object-cover flex-shrink-0 border border-slate-200 dark:border-slate-700">
            <div class="flex-grow min-w-0">
              <p class="font-bold text-sm text-slate-900 dark:text-white truncate">${m.name}</p>
              <p class="text-xs text-slate-500 dark:text-slate-400 truncate">${m.course}</p>
              ${m.observation ? `<p class="text-xs text-primary-600 dark:text-primary-400 font-medium truncate mt-1">💬 "${m.observation}"</p>` : ''}
            </div>
            ${adminControlsHTML}
          </div>
        `}).join("");

        document.querySelectorAll('.delete-queue-btn').forEach(b => {
          b.addEventListener("click", (e) => {
            e.preventDefault();
            const memberName = b.dataset.name;
            showConfirmModal("Remover da Fila", `Deseja remover ${memberName} da fila?`, async () => {
                await deleteDoc(doc(db, "queues", currentQueueId, "members", b.dataset.uid));
                await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `Admin removeu ${memberName}.`, type: "system", timestamp: serverTimestamp() });
                showToast(`${memberName} removido.`, "success");
            });
          });
        });

        document.querySelectorAll('.move-queue-btn').forEach(b => {
          b.addEventListener("click", (e) => {
            e.preventDefault(); handleMoveInQueue(b.dataset.uid, b.dataset.direction);
          });
        });
        
        if(isIn) { showEl("observation-section", "block"); } 
        else { hideEl("observation-section"); }
      }

      function renderChat(msgs) {
        const chatEl = el("chat-messages");
        chatEl.innerHTML = msgs.map(msg => {
          if (msg.type === "system") {
            return `<div class="text-[10px] text-center uppercase tracking-widest text-slate-500 font-bold my-3">${msg.text}</div>`;
          }
          const isMe = msg.uid === currentUser.uid;
          const time = msg.timestamp ? msg.timestamp.toDate().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" }) : "--:--";
          const initial = msg.userName ? msg.userName.charAt(0).toUpperCase() : "U";
          const avatar = msg.userPhotoUrl || `https://placehold.co/100x100/${getThemeHex()}/ffffff?text=${initial}`;
          
          return `
            <div class="flex items-start gap-2.5 ${isMe ? "justify-end" : ""}">
              <img class="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-slate-200 dark:border-slate-700 shadow-sm ${isMe ? "order-2" : "order-1"}" src="${avatar}">
              <div class="flex flex-col gap-1 ${isMe ? "order-1 items-end" : "order-2 items-start"} max-w-[85%]">
                <div class="flex items-center space-x-2">
                  <span class="text-xs font-semibold text-slate-900 dark:text-white">${isMe ? "Você" : msg.userName}</span>
                  <span class="text-[10px] text-slate-500">${time}</span>
                </div>
                <div class="leading-snug p-3 rounded-xl ${isMe ? "bg-primary-500 text-white rounded-br-none border-transparent" : "bg-slate-100 dark:bg-[#0f172a] border border-slate-200 dark:border-slate-700 text-slate-800 dark:text-white rounded-bl-none shadow-sm"} break-words">
                  <p class="text-sm font-medium">${msg.text}</p>
                </div>
              </div>
            </div>`;
        }).join("");
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function renderLogs(logs) {
        if (logs.length === 0) { el("logs-list").innerHTML = '<p class="text-center text-slate-500 font-medium">Nenhum registro.</p>'; return; }
        el("logs-list").innerHTML = logs.map(log => {
            const time = log.timestamp ? log.timestamp.toDate().toLocaleString("pt-BR") : "";
            if (log.type === "system") { return `<div class="p-3 rounded-xl bg-slate-50 dark:bg-[#0f172a] border border-slate-200 dark:border-slate-700 flex items-start gap-3 text-sm shadow-sm"><span class="mt-1">⚙️</span><div><p class="font-semibold text-slate-700 dark:text-slate-300">${log.text}</p><p class="text-[10px] text-slate-500 font-medium">${time}</p></div></div>`; }
            const isMe = log.uid === currentUser.uid;
            const initial = log.userName ? log.userName.charAt(0).toUpperCase() : "U";
            const avatar = log.userPhotoUrl || `https://placehold.co/100x100/${getThemeHex()}/ffffff?text=${initial}`;
            return `<div class="flex items-start gap-2.5"><img class="w-8 h-8 rounded-full object-cover flex-shrink-0 border border-slate-200 dark:border-slate-700 shadow-sm" src="${avatar}"><div class="flex flex-col gap-1 max-w-[85%]"><div class="flex items-center space-x-2"><span class="text-xs font-bold text-slate-900 dark:text-white">${isMe ? "Você" : log.userName}</span><span class="text-[10px] text-slate-500 font-medium">${time}</span></div><div class="leading-snug p-3 rounded-xl bg-slate-100 dark:bg-[#0f172a] border border-slate-200 dark:border-slate-700/50 text-slate-800 dark:text-white shadow-sm break-words"><p class="text-sm font-medium">${log.text}</p></div></div></div>`;
        }).join("");
      }

      async function renderQueueList() {
        const list = el("queues-list"); list.innerHTML = "";
        for(const id of (userProfile.joinedQueues || [])) {
          const d = await getDoc(doc(db, "queues", id));
          if(d.exists()) {
            const div = document.createElement("div"); div.className = "card-style cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors";
            div.innerHTML = `<h3 class="font-bold text-lg text-slate-900 dark:text-white">${d.data().name}</h3><p class="text-xs font-semibold text-slate-500 mt-1 uppercase tracking-wider">Código: ${d.data().code}</p>`;
            div.onclick = () => enterQueue(id); list.appendChild(div);
          }
        }
      }

      function switchAuthTab(tabName) {
        const loginForm = el("login-form"), registerForm = el("register-form"), btnLogin = el("show-login-tab"), btnRegister = el("show-register-tab");
        btnLogin.className = "flex-1 pb-3 text-center font-bold text-slate-500 border-b-2 border-transparent transition-colors";
        btnRegister.className = "flex-1 pb-3 text-center font-bold text-slate-500 border-b-2 border-transparent transition-colors";
        if (tabName === "login") {
            btnLogin.className = "flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500 transition-colors z-10";
            hideEl("register-form"); showEl("login-form", "block");
        } else {
            btnRegister.className = "flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500 transition-colors z-10";
            hideEl("login-form"); showEl("register-form", "block");
        }
      }

      // --- EVENT LISTENERS BLINDADOS ---
      addEvt("view-logs-btn", "click", async (e) => { 
          e.preventDefault(); 
          el("logs-list").innerHTML = '<div class="flex justify-center p-4"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary-500"></div></div>';
          showEl("logs-modal", "flex");
          try {
              const q = query(collection(db, "queues", currentQueueId, "chat"), orderBy("timestamp", "desc"), limit(200));
              const snap = await getDocs(q);
              renderLogs(snap.docs.map(d => d.data()));
          } catch (error) { el("logs-list").innerHTML = '<p class="text-red-500 text-center">Erro no histórico.</p>'; }
      });
      addEvt("close-logs-modal", "click", (e) => { e.preventDefault(); hideEl("logs-modal"); });

      addEvt("login-btn", "click", (e) => { 
          e.preventDefault(); 
          showEl("loading-section", "flex");
          signInWithEmailAndPassword(auth, el("loginEmail").value, el("loginPassword").value).catch(() => {
            showToast("E-mail ou senha incorretos", "error"); hideEl("loading-section");
          }); 
      });
      
      addEvt("register-btn", "click", async (e) => {
        e.preventDefault();
        const email = el("registerEmail").value.trim(), pwd = el("registerPassword").value, pwdConfirm = el("registerPasswordConfirm").value, phone = el("registerPhone").value.trim();
        if (pwd !== pwdConfirm) { showToast("As senhas não coincidem.", "error"); return; }
        if (pwd.length < 6) { showToast("A senha deve ter 6 caracteres.", "error"); return; }
        pendingRegistrationPhone = phone;
        showEl("loading-section", "flex");
        try { await createUserWithEmailAndPassword(auth, email, pwd); } catch (error) { showToast("Erro ao criar conta. Email em uso?", "error"); hideEl("loading-section"); }
      });
      
      addEvt("join-leave-btn", "click", async (e) => {
        e.preventDefault();
        if (!isTimeSynced) {
            showToast("Sincronizando relógio global...", "info");
            await syncServerTime();
            if(!isTimeSynced) { showToast("Sua internet falhou na sincronização.", "error"); return; }
        }

        const isIn = currentQueueMembers.some(m => m.uid === currentUser.uid);
        if (isIn) return; 

        const brt = getBrasiliaTime();
        if (!currentQueueSettings || !brt) return;
        
        const currentMinutes = brt.hour * 60 + brt.minute;
        const [oh, om] = currentQueueSettings.openTime.split(":").map(Number);
        const [ch, cm] = currentQueueSettings.closeTime.split(":").map(Number);
        const openMinutes = oh * 60 + om; const closeMinutes = ch * 60 + cm;
        
        if (currentMinutes < openMinutes || currentMinutes >= closeMinutes) { 
            showToast("A fila não está aberta (Horário Oficial)!", "error"); 
            return; 
        }

        showEl("loading-section", "flex");
        try {
            await setDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid), {
              name: userProfile.name, course: userProfile.course, photoUrl: userProfile.photoUrl || "", uid: currentUser.uid, timestamp: serverTimestamp()
            });
            await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `${userProfile.name} entrou na fila!`, type: "system", timestamp: serverTimestamp() });
        } catch(err) { showToast("Erro ao entrar", "error"); } finally { hideEl("loading-section"); }
      });

      addEvt("header-leave-queue-btn", "click", (e) => {
        e.preventDefault();
        showConfirmModal("Sair da Fila", "Tem certeza que deseja sair? Perderá a sua posição.", async () => {
            showEl("loading-section", "flex");
            try {
                await deleteDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid));
                await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `${userProfile.name} saiu da fila.`, type: "system", timestamp: serverTimestamp() });
                showToast("Você saiu da fila.", "success");
            } catch(e) {} finally { hideEl("loading-section"); }
        });
      });

      addEvt("chat-form", "submit", async (e) => {
        e.preventDefault();
        const text = el("chat-input").value.trim(); if(!text) return; el("chat-input").value = "";
        await addDoc(collection(db, "queues", currentQueueId, "chat"), { text, userName: userProfile.name.split(" ")[0], userPhotoUrl: userProfile.photoUrl || "", uid: currentUser.uid, timestamp: serverTimestamp() });
      });

      addEvt("save-observation-btn", "click", (e) => {
          e.preventDefault();
          updateDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid), { observation: el("userObservation").value });
          showToast("Observação guardada!", "success");
      });

      addEvt("save-profile-btn", "click", async (e) => {
        e.preventDefault();
        const name = el("userName").value.trim(), course = el("userCourse").value.trim(), phone = el("userProfilePhone").value.trim();
        if(!name || !course) { showToast("Nome e Curso são obrigatórios", "error"); return; }
        
        showEl("loading-section", "flex");
        try {
            const photo = tempPhotoDataUrl || userProfile?.photoUrl || `https://placehold.co/200x200/${getThemeHex()}/ffffff?text=${name.charAt(0).toUpperCase()}`;
            const data = { name, course, phone, photoUrl: photo };
            await updateDoc(doc(db, "users", currentUser.uid), data); userProfile = {...userProfile, ...data};
            if (currentQueueId) {
               const memberRef = doc(db, "queues", currentQueueId, "members", currentUser.uid);
               const memberSnap = await getDoc(memberRef);
               if (memberSnap.exists()) await updateDoc(memberRef, { name, course, photoUrl: photo });
               el("header-user-avatar").src = photo; 
               hideEl("profile-overlay");
            } else { hideEl("profile-overlay"); showScreen("queueSelection"); renderQueueList(); }
            showToast("Perfil salvo com sucesso!", "success");
        } catch(e) { showToast("Erro ao salvar", "error"); } finally { hideEl("loading-section"); }
      });

      addEvt("close-profile-btn", "click", (e) => {
        e.preventDefault();
        if (!userProfile?.name) { showToast("Você precisa salvar o seu perfil primeiro.", "error"); } 
        else { hideEl("profile-overlay"); }
      });

      addEvt("share-location-btn", "click", (e) => {
        e.preventDefault();
        if (!navigator.geolocation) { showToast("GPS não suportado.", "error"); return; }
        showToast("Obtendo localização...", "info");
        navigator.geolocation.getCurrentPosition(async (position) => {
            const { latitude, longitude } = position.coords;
            try {
              await setDoc(doc(db, "locations", currentUser.uid), { lat: latitude, lng: longitude, timestamp: serverTimestamp(), driverName: userProfile.name }, { merge: true });
              showToast("Localização partilhada!", "success");
            } catch (error) { showToast("Erro no servidor.", "error"); }
        }, () => { showToast("Ative o seu GPS.", "error"); });
      });

      addEvt("main-logout-btn", "click", (e) => {
        e.preventDefault(); localStorage.removeItem("lastQueueId"); currentQueueId = null; currentQueueSettings = null;
        if (unsubMembers) unsubMembers(); if (unsubSettings) unsubSettings(); if (unsubChat) unsubChat();
        signOut(auth).then(() => { showScreen("auth"); });
      });

      addEvt("back-to-selection-btn", "click", (e) => { 
        e.preventDefault(); localStorage.removeItem("lastQueueId"); currentQueueId = null; currentQueueSettings = null;
        if (unsubMembers) unsubMembers(); if (unsubSettings) unsubSettings(); if (unsubChat) unsubChat();
        showScreen("queueSelection"); renderQueueList();
      });

      addEvt("show-login-tab", "click", (e) => { e.preventDefault(); switchAuthTab("login"); });
      addEvt("show-register-tab", "click", (e) => { e.preventDefault(); switchAuthTab("register"); });

      addEvt("join-new-queue-btn", "click", (e) => { e.preventDefault(); showEl("join-queue-modal", "flex"); });
      addEvt("cancel-join-queue", "click", (e) => { e.preventDefault(); hideEl("join-queue-modal"); });
      
      addEvt("confirm-join-queue", "click", async (e) => {
          e.preventDefault(); const code = el("queue-code-input").value.trim().toUpperCase(); if(!code) return;
          showEl("loading-section", "flex");
          try {
              const q = query(collection(db, "queues"), where("code", "==", code)); const snap = await getDocs(q);
              if (!snap.empty) {
                  const id = snap.docs[0].id; const joined = userProfile.joinedQueues || [];
                  if (!joined.includes(id)) { joined.push(id); await updateDoc(doc(db, "users", currentUser.uid), { joinedQueues: joined }); }
                  hideEl("join-queue-modal");
                  renderQueueList(); showToast("Adicionado!", "success");
              } else { showToast("Código inválido", "error"); }
          } catch(err) { showToast("Erro ao entrar", "error"); } finally { hideEl("loading-section"); }
      });
      
      addEvt("edit-profile-btn", "click", (e) => { e.preventDefault(); openProfileModal(); });
      
      addEvt("save-schedule-btn", "click", (e) => {
          e.preventDefault();
          updateDoc(doc(db, "queues", currentQueueId), { openTime: el("queueOpenTime").value, closeTime: el("queueCloseTime").value }).then(() => showToast("Horários salvos!", "success"));
      });

      addEvt("restart-queue-btn", "click", (e) => {
          e.preventDefault();
          showConfirmModal("Zerar Fila", "Certeza que deseja esvaziar a fila agora?", async () => {
              showEl("loading-section", "flex");
              try {
                const batch = writeBatch(db); const membersSnap = await getDocs(collection(db, "queues", currentQueueId, "members"));
                if (membersSnap.empty) { showToast("A fila já está vazia.", "info"); hideEl("loading-section"); return; }
                membersSnap.docs.forEach(d => batch.delete(d.ref)); await batch.commit();
                await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `O Admin limpou a fila.`, type: "system", timestamp: serverTimestamp() });
                showToast("Fila zerada!", "success");
              } catch (error) { showToast("Erro ao zerar.", "error"); } finally { hideEl("loading-section"); }
          });
      });

    </script>
  </body>
</html>
