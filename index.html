<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Fila Virtual (Online)</title>
    
    <script>
      const savedTheme = localStorage.getItem('appTheme') || 'theme-indigo';
      document.documentElement.classList.add(savedTheme);
      const savedDarkMode = localStorage.getItem('appDarkMode');
      if (savedDarkMode === 'false') { document.documentElement.classList.remove('dark'); } 
      else { document.documentElement.classList.add('dark'); }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: { 
            extend: { 
                colors: { 
                    primary: { 
                        100: 'rgb(var(--p-100) / <alpha-value>)', 
                        200: 'rgb(var(--p-200) / <alpha-value>)', 
                        400: 'rgb(var(--p-400) / <alpha-value>)', 
                        500: 'rgb(var(--p-500) / <alpha-value>)', 
                        600: 'rgb(var(--p-600) / <alpha-value>)',
                        900: 'rgb(var(--p-900) / <alpha-value>)'
                    } 
                } 
            } 
        }
      }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /* --- VARIÁVEIS DE TEMA --- */
      :root.theme-indigo {
        --p-100: 224 231 255; --p-200: 199 210 254; --p-400: 129 140 248;
        --p-500: 99 102 241; --p-600: 79 70 229; --p-900: 49 46 129;
      }
      :root.theme-emerald {
        --p-100: 209 250 229; --p-200: 167 243 208; --p-400: 52 211 153;
        --p-500: 16 185 129; --p-600: 5 150 105; --p-900: 6 78 59;
      }
      :root.theme-rose {
        --p-100: 255 228 230; --p-200: 254 205 211; --p-400: 251 113 133;
        --p-500: 244 63 94; --p-600: 225 29 72; --p-900: 136 19 55;
      }
      :root.theme-amber {
        --p-100: 254 243 199; --p-200: 253 230 138; --p-400: 251 191 36;
        --p-500: 245 158 11; --p-600: 217 119 6; --p-900: 120 53 15;
      }

      body { 
        font-family: "Inter", sans-serif; 
        background-color: #f8fafc; 
        color: #0f172a; 
      }
      
      .dark body { 
        background: linear-gradient(160deg, #1e1b4b 0%, #0f172a 40%, #020617 100%);
        background-attachment: fixed;
        color: #f8fafc; 
      }

      .fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.39, 0.575, 0.565, 1) both; }
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

      .card-style { background-color: #ffffff; border-radius: 1.25rem; padding: 1.25rem; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); border: 1px solid #e2e8f0; }
      .dark .card-style { background-color: #1e293b; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5); border: 1px solid rgba(255,255,255,0.05); }
      
      .input-style { background-color: #f1f5f9; color: #0f172a; border-radius: 0.75rem; padding: 0.875rem 1rem; width: 100%; outline: none; border: 1px solid #cbd5e1; transition: border-color 0.2s; }
      .dark .input-style { background-color: #0f172a; color: white; border: 1px solid #334155; }
      .input-style:focus { border-color: rgb(var(--p-500)); }

      #random-join-btn {
        background: rgb(var(--p-500));
        color: white;
        font-weight: 800;
        font-size: 1.125rem;
        padding: 1rem 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px -5px rgb(var(--p-500) / 0.6);
        transition: transform 0.2s ease;
        border: 2px solid rgba(255, 255, 255, 0.2);
        z-index: 50;
      }
      #random-join-btn:active { transform: scale(0.95); }

      #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; font-weight: 600; color: white; z-index: 99999; transition: all 0.4s ease; text-align: center; width: max-content; max-w: 90%; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
      #toast.show { top: 20px; }
      #toast.success { background: #10b981; }
      #toast.error { background: #ef4444; }
      #toast.info { background: rgb(var(--p-500)); }

      .modal-overlay { position: fixed; inset: 0; background-color: rgba(0, 0, 0, 0.75); backdrop-filter: blur(4px); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; display: none;}
      
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgb(var(--p-500)); border-radius: 10px; }
      
      button { transition: all 0.2s ease; cursor: pointer; }
      button:active { transform: scale(0.96); }
    </style>
  </head>
  <body class="antialiased min-h-screen">

    <div id="loading-section" class="fixed inset-0 z-[99999] flex items-center justify-center bg-slate-50 dark:bg-[#0f172a] transition-opacity duration-300">
      <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-primary-500"></div>
    </div>

    <button type="button" id="random-join-btn" class="hidden fixed">Entrar na Fila</button>

    <div id="app-container" class="container mx-auto max-w-md pb-32 pt-6 px-4">
      <div id="toast"></div>

      <!-- TELA DE AUTENTICAÇÃO -->
      <div id="auth-overlay" style="display: none;" class="flex-col items-center justify-center min-h-[80vh] py-4">
        <div class="w-full card-style fade-in-up">
          <div class="flex border-b border-slate-300 dark:border-slate-700 mb-6">
            <button type="button" id="show-login-tab" class="flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500">Entrar</button>
            <button type="button" id="show-register-tab" class="flex-1 pb-3 text-center font-bold text-slate-500 dark:text-slate-400 border-b-2 border-transparent">Registrar</button>
          </div>

          <div id="login-form" class="fade-in-up">
            <input type="email" id="loginEmail" placeholder="E-mail" class="input-style mb-4" autocomplete="email" />
            <div class="relative mb-6 w-full">
              <input type="password" id="loginPassword" placeholder="Senha" class="input-style pr-12" autocomplete="current-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 hover:text-primary-500 toggle-password-btn" data-target="loginPassword">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <button type="button" id="login-btn" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Entrar</button>
            <button type="button" id="forgot-password-link" class="w-full text-center mt-5 text-sm text-primary-500 hover:underline">Esqueceu a senha?</button>
          </div>

          <div id="register-form" style="display: none;">
            <input type="email" id="registerEmail" placeholder="E-mail" class="input-style mb-4" autocomplete="email" />
            <input type="tel" id="registerPhone" placeholder="Celular (Opcional)" class="input-style mb-4" autocomplete="tel" />
            <div class="relative mb-4 w-full">
              <input type="password" id="registerPassword" placeholder="Senha (mín. 6)" class="input-style pr-12" autocomplete="new-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 toggle-password-btn" data-target="registerPassword">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <div class="relative mb-6 w-full">
              <input type="password" id="registerPasswordConfirm" placeholder="Confirmar Senha" class="input-style pr-12" autocomplete="new-password" />
              <button type="button" class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 toggle-password-btn" data-target="registerPasswordConfirm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
              </button>
            </div>
            <button type="button" id="register-btn" class="w-full bg-[#10b981] hover:bg-emerald-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Criar Conta</button>
          </div>
        </div>
      </div>

      <!-- TELA MINHAS FILAS -->
      <div id="queue-selection-screen" style="display: none;" class="space-y-6 fade-in-up">
        <div class="mx-auto w-max bg-[#1e293b] px-6 py-3 rounded-[2rem] shadow-lg flex-col items-center justify-center text-center">
            <div class="text-[10px] uppercase tracking-widest text-primary-400 font-bold mb-0.5 flex items-center justify-center gap-1.5">
                <span class="sync-dot w-2 h-2 rounded-full bg-green-500" id="sync-status-dot"></span> <span id="sync-status-text">HORÁRIO DE BRASÍLIA</span>
            </div>
            <div class="server-clock-display text-3xl font-mono font-bold text-white tracking-widest">Carregando...</div>
        </div>

        <h1 class="text-3xl font-bold text-center text-slate-900 dark:text-white mb-4">Minhas Filas</h1>
        
        <div id="queues-list" class="space-y-4"></div>
        
        <div class="space-y-4 pt-6 border-t border-slate-300 dark:border-slate-800">
          <button type="button" id="join-new-queue-btn" class="w-full bg-slate-200 dark:bg-slate-800 text-slate-800 dark:text-white font-bold py-4 rounded-xl shadow-md">Entrar por Código</button>
          <button type="button" id="create-new-queue-btn" style="display: none;" class="w-full bg-primary-500 text-white font-bold py-4 rounded-xl shadow-md">Criar Fila</button>
          <button type="button" id="main-logout-btn" class="w-full text-center text-sm text-red-500 font-bold hover:underline py-3">Sair da Conta</button>
        </div>
      </div>

      <!-- CONTEÚDO DA FILA -->
      <div id="main-content" style="display: none;" class="space-y-5 fade-in-up">
        
        <header class="flex justify-between items-center relative z-20">
          <div>
            <button type="button" id="back-to-selection-btn" class="flex items-center gap-1 text-sm font-bold text-slate-500 hover:text-primary-400 mb-1">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg> Voltar
            </button>
            <h1 id="header-queue-name" class="text-3xl font-black text-slate-900 dark:text-white tracking-tight">Fila</h1>
          </div>
          <div class="flex items-center gap-3">
            <button type="button" id="edit-profile-btn" class="text-slate-400 hover:text-primary-400 p-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            </button>
            <img id="header-user-avatar" class="w-12 h-12 rounded-full object-cover shadow-md" />
            <button type="button" id="header-leave-queue-btn" style="display: none;" class="bg-red-500 text-white font-bold py-2 px-4 rounded-xl text-sm">Sair</button>
          </div>
        </header>

        <div class="mx-auto w-max bg-[#1e293b] px-8 py-3 rounded-[2rem] shadow-lg flex-col items-center justify-center text-center mt-2 mb-6">
            <div class="text-[10px] uppercase tracking-widest text-primary-400 font-bold mb-0.5 flex items-center justify-center gap-1.5">
                <span class="sync-dot w-2 h-2 rounded-full bg-green-500"></span> HORÁRIO DE BRASÍLIA
            </div>
            <div class="server-clock-display text-4xl font-mono font-black text-white tracking-widest">Carregando...</div>
        </div>

        <div id="super-admin-panel" style="display: none;" class="card-style space-y-4">
          <h2 class="text-xl font-bold text-center text-amber-500">Painel Admin</h2>
          <div class="grid grid-cols-2 gap-3 text-sm">
            <input type="time" id="queueOpenTime" class="input-style" />
            <input type="time" id="queueCloseTime" class="input-style" />
          </div>
          <button type="button" id="save-schedule-btn" class="w-full bg-[#3b82f6] hover:bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md">Salvar Horários</button>
          <div class="grid grid-cols-2 gap-3">
            <button type="button" id="restart-queue-btn" class="bg-[#ef4444] hover:bg-red-600 text-white font-bold py-3 rounded-xl shadow-md">Zerar Fila</button>
            <button type="button" id="view-logs-btn" class="bg-[#475569] hover:bg-slate-600 text-white font-bold py-3 rounded-xl shadow-md">Histórico</button>
          </div>
        </div>

        <div id="driver-panel" style="display: none;" class="card-style space-y-3">
            <h2 class="text-lg font-bold text-center text-cyan-400">Painel do Motorista</h2>
            <button type="button" id="share-location-btn" class="w-full bg-cyan-500 hover:bg-cyan-600 text-white font-bold py-3.5 px-4 rounded-xl shadow-md">Compartilhar Localização</button>
        </div>

        <div class="bg-primary-500 text-white p-6 rounded-3xl shadow-lg flex justify-between items-center">
          <div>
            <p class="text-primary-100 text-sm font-medium mb-1">Sua Posição</p>
            <p id="user-position" class="text-5xl font-black leading-none">-</p>
          </div>
          <div class="text-right">
            <p class="text-primary-100 text-sm font-medium mb-1">Total na Fila</p>
            <p id="total-in-queue" class="text-4xl font-bold leading-none">0</p>
          </div>
        </div>

        <div id="queue-status-card" class="text-center p-4 rounded-2xl font-bold mt-4">
          <p id="queue-status-message"></p>
        </div>

        <!-- CHAT EMBUTIDO NA TELA PRINCIPAL (RESTAURADO DA VERSÃO ANTIGA) -->
        <div id="chat-section" class="card-style space-y-3">
            <h3 class="text-lg font-bold text-center text-slate-800 dark:text-white">Chat da Fila</h3>
            <div id="chat-messages" class="h-64 overflow-y-auto space-y-4 p-2 bg-slate-50 dark:bg-[#0f172a] border border-slate-200 dark:border-slate-700 rounded-xl mb-3 scroll-smooth"></div>
            <form id="chat-form" class="flex gap-2 w-full">
                <input type="text" id="chat-input" placeholder="Digite uma mensagem..." class="flex-1 min-w-0 input-style py-2" autocomplete="off" />
                <button type="submit" id="send-chat-btn" class="shrink-0 bg-primary-500 hover:bg-primary-600 text-white font-bold h-full aspect-square rounded-xl shadow-md flex items-center justify-center transition-transform active:scale-95">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>

        <!-- OBSERVAÇÃO (Fixa na lista da fila) -->
        <div id="observation-section" style="display: none;" class="card-style space-y-3">
          <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Sua Observação na Fila</label>
          <div class="flex items-center gap-2 w-full">
            <input type="text" id="userObservation" placeholder="Ex: Estou em prova, chego em 10 min..." class="flex-1 min-w-0 input-style" />
            <button type="button" id="save-observation-btn" class="shrink-0 bg-[#10b981] hover:bg-emerald-600 text-white font-bold py-3.5 px-4 rounded-xl">Guardar</button>
          </div>
        </div>

        <div class="space-y-3 pb-32 mt-6">
          <div id="queue-list" class="space-y-3"></div>
        </div>
      </div>
    </div>

    <!-- Modais -->
    <div id="profile-overlay" style="display: none;" class="modal-overlay overflow-y-auto">
        <div class="w-full max-w-md mx-auto card-style space-y-5 fade-in-up">
            <h2 class="text-2xl font-bold text-center text-slate-900 dark:text-white">Perfil</h2>
            <div class="flex justify-center relative group cursor-pointer w-max mx-auto" id="profile-pic-container">
                <img id="profile-pic-preview" class="w-24 h-24 rounded-full object-cover border-2 border-primary-500 shadow-md" />
                <div class="absolute inset-0 flex items-center justify-center bg-black/50 rounded-full opacity-0 group-hover:opacity-100">
                    <span class="text-white text-[10px] font-bold">MUDAR</span>
                </div>
                <input type="file" id="profile-pic-input" accept="image/*" style="display: none;" />
            </div>
            <div class="space-y-4">
              <input type="text" id="userName" placeholder="Nome Completo" class="input-style" />
              <input type="text" id="userCourse" placeholder="Curso / Setor" class="input-style" />
              <input type="tel" id="userProfilePhone" placeholder="Celular (Opcional)" class="input-style" />
            </div>

            <!-- OPÇÕES DE TEMAS E MODO ESCURO -->
            <div class="pt-4 border-t border-slate-200 dark:border-slate-700 space-y-4">
                <div class="space-y-2">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Tema de Cores</label>
                    <div class="flex items-center gap-3">
                        <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#6366f1] ring-2 ring-offset-2 ring-transparent ring-offset-white dark:ring-offset-slate-900 transition-all" data-theme="theme-indigo"></button>
                        <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#10b981] ring-2 ring-offset-2 ring-transparent ring-offset-white dark:ring-offset-slate-900 transition-all" data-theme="theme-emerald"></button>
                        <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#f43f5e] ring-2 ring-offset-2 ring-transparent ring-offset-white dark:ring-offset-slate-900 transition-all" data-theme="theme-rose"></button>
                        <button type="button" class="theme-btn w-8 h-8 rounded-full bg-[#f59e0b] ring-2 ring-offset-2 ring-transparent ring-offset-white dark:ring-offset-slate-900 transition-all" data-theme="theme-amber"></button>
                    </div>
                </div>
                <div class="flex items-center justify-between p-3 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-[#0f172a]">
                    <span class="text-sm font-bold text-slate-700 dark:text-slate-300">Modo Escuro</span>
                    <input type="checkbox" id="dark-mode-toggle" class="w-5 h-5 rounded border-slate-300 text-primary-500 focus:ring-primary-500" />
                </div>
            </div>

            <div class="pt-2 space-y-3">
              <button type="button" id="save-profile-btn" class="w-full bg-primary-500 hover:bg-primary-600 text-white font-bold py-3.5 rounded-xl shadow-lg">Guardar Alterações</button>
              <button type="button" id="close-profile-btn" class="w-full text-slate-500 dark:text-slate-400 font-bold py-2 hover:underline">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Modal do Histórico (Admin/Logs) -->
    <div id="logs-modal" style="display: none;" class="modal-overlay z-[9999]">
        <div class="w-full max-w-lg card-style space-y-4 fade-in-up flex flex-col h-[85vh]">
            <div class="flex justify-between items-center shrink-0 border-b border-slate-200 dark:border-slate-700 pb-3">
                <h2 class="text-xl font-bold text-slate-900 dark:text-white">Histórico da Fila</h2>
                <button type="button" id="close-logs-modal" class="text-slate-400 hover:text-red-500 text-3xl font-bold leading-none">&times;</button>
            </div>
            <div id="logs-list" class="flex-grow overflow-y-auto space-y-3 pr-2 scroll-smooth"></div>
        </div>
    </div>

    <div id="join-queue-modal" style="display: none;" class="modal-overlay flex-col items-center justify-center">
      <div class="card-style w-full max-w-sm space-y-6 fade-in-up">
        <h3 class="text-xl font-bold text-center text-white">Entrar na Fila</h3>
        <input type="text" id="queue-code-input" placeholder="CÓDIGO DA FILA" class="input-style text-center tracking-[0.3em] font-mono font-bold uppercase py-4 text-lg" />
        <div class="grid grid-cols-2 gap-3">
          <button type="button" id="cancel-join-queue" class="bg-slate-700 text-white font-bold py-3.5 rounded-xl">Cancelar</button>
          <button type="button" id="confirm-join-queue" class="bg-primary-500 text-white font-bold py-3.5 rounded-xl shadow-lg">Entrar</button>
        </div>
      </div>
    </div>

    <div id="confirm-modal" style="display: none;" class="modal-overlay z-[9999]">
      <div class="card-style w-full max-w-sm space-y-5 text-center fade-in-up">
        <h3 class="text-xl font-bold text-white" id="confirm-modal-title">Atenção</h3>
        <p class="text-sm font-medium text-slate-400" id="confirm-modal-text">Tem certeza que deseja continuar?</p>
        <div class="grid grid-cols-2 gap-3 pt-4">
          <button type="button" id="cancel-confirm-btn" class="bg-slate-700 text-white font-bold py-3.5 rounded-xl">Cancelar</button>
          <button type="button" id="accept-confirm-btn" class="bg-red-500 text-white font-bold py-3.5 rounded-xl shadow-lg hover:bg-red-600">Confirmar</button>
        </div>
      </div>
    </div>

    <!-- ============================================================== -->

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
      import { getFirestore, doc, setDoc, getDoc, updateDoc, deleteDoc, collection, onSnapshot, query, writeBatch, addDoc, serverTimestamp, getDocs, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDRf7ZciyvbJkX-P5cfWkzfI2Uw11Lxy0Q",
        authDomain: "filaonibus.firebaseapp.com",
        projectId: "filaonibus",

      // --- LEITOR DE FOTO COM COMPRESSÃO INTELIGENTE ---
      bindClick("profile-pic-container", () => el("profile-pic-input").click());
      el("profile-pic-input").addEventListener("change", function(e) {
          const file = e.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = function(event) {
              const img = new Image();
              img.onload = function() {
                  const canvas = document.createElement("canvas");
                  const MAX_SIZE = 256;
                  let width = img.width;
                  let height = img.height;

                  if (width > height) {
                      if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                  } else {
                      if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                  }
                  
                  canvas.width = width;
                  canvas.height = height;
                  const ctx = canvas.getContext("2d");
                  ctx.drawImage(img, 0, 0, width, height);
                  
                  tempPhotoDataUrl = canvas.toDataURL("image/jpeg", 0.8);
                  el("profile-pic-preview").src = tempPhotoDataUrl;
              };
              img.src = event.target.result;
          };
          reader.readAsDataURL(file);
      });

      async function syncServerTime() {
        isTimeSynced = false;
        const statusDot = el("sync-status-dot"), statusText = el("sync-status-text");
        if(statusDot) { statusDot.classList.remove("bg-green-500", "bg-red-500"); statusDot.classList.add("bg-amber-500", "animate-pulse"); }
        if(statusText) statusText.textContent = "SINCRONIZANDO...";

        const sources = ['https://worldtimeapi.org/api/timezone/America/Sao_Paulo', 'https://timeapi.io/api/Time/current/zone?timeZone=America/Sao_Paulo'];
        for (let src of sources) {
          try {
            const res = await fetch(src, { cache: 'no-store' });
            if (res.ok) {
              const data = await res.json();
              const dateStr = data.datetime || data.dateTime;
              baseServerTime = new Date(dateStr).getTime();
              syncLocalTimer = performance.now();
              finishSync(true); return;
            }
          } catch (e) { console.warn(`Falha na fonte ${src}`); }
        }
        baseServerTime = Date.now();
        syncLocalTimer = performance.now();
        finishSync(true); 
      }

      function finishSync(success) {
        isTimeSynced = success;
        const statusDot = el("sync-status-dot"), statusText = el("sync-status-text");
        if(statusDot) { statusDot.classList.remove("bg-amber-500", "animate-pulse"); statusDot.classList.add(success ? "bg-green-500" : "bg-red-500"); }
        if(statusText) statusText.textContent = success ? "HORÁRIO SINCRONIZADO" : "ERRO DE SINCRONIA";
      }

      function getFormattedTime() {
        const elapsed = performance.now() - syncLocalTimer;
        const adjustedNow = new Date(baseServerTime + elapsed);
        const options = { timeZone: 'America/Sao_Paulo', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
        const timeString = adjustedNow.toLocaleTimeString('pt-BR', options);
        const parts = new Intl.DateTimeFormat('pt-BR', options).formatToParts(adjustedNow);
        let h = 0, m = 0; parts.forEach(p => { if(p.type === 'hour') h = parseInt(p.value); if(p.type === 'minute') m = parseInt(p.value); });
        const dateOptions = { timeZone: 'America/Sao_Paulo', year: 'numeric', month: '2-digit', day: '2-digit' };
        const dateParts = new Intl.DateTimeFormat('pt-BR', dateOptions).formatToParts(adjustedNow);
        let yyyy, mm, dd; dateParts.forEach(p => { if(p.type === 'year') yyyy = p.value; if(p.type === 'month') mm = p.value; if(p.type === 'day') dd = p.value; });
        return { timeString, hour: h, minute: m, dateStringBRT: `${yyyy}-${mm}-${dd}` };
      }

        const randomX = Math.floor(Math.random() * (maxX - minX + 1)) + minX;

        btn.style.left = `${randomX}px`; btn.style.top = `${randomY}px`; btn.style.bottom = 'auto';

      function updatePeriodicUI(brt) {

            msg.textContent = "Agendamento pendente."; card.className = "text-center p-4 rounded-2xl border border-slate-700 text-slate-400";
        } else {
            const currentMinutes = brt.hour * 60 + brt.minute;
            const [oh, om] = currentQueueSettings.openTime.split(":").map(Number);
            const [ch, cm] = currentQueueSettings.closeTime.split(":").map(Number);
            const openMinutes = oh * 60 + om; const closeMinutes = ch * 60 + cm;
            if (currentMinutes < openMinutes) {
                msg.textContent = `Fila fechada. Abre às ${currentQueueSettings.openTime}`;
                card.className = "text-center p-4 rounded-2xl bg-[#0f172a] text-slate-300";
            } else if (currentMinutes >= openMinutes && currentMinutes < closeMinutes) {
                isOpen = true;

                card.className = "text-center p-4 rounded-2xl bg-[#0f172a] text-primary-400 border border-primary-500/30";

      async function handleMoveInQueue(uid, direction) {
          const queue = [...currentQueueMembers];
          const userIndex = queue.findIndex(u => u.uid === uid);
          if (userIndex === -1) return;
          
          let swapIndex;
          if (direction === 'up' && userIndex > 0) swapIndex = userIndex - 1;
          else if (direction === 'down' && userIndex < queue.length - 1) swapIndex = userIndex + 1;
          else return;

          const userToMove = queue[userIndex];
          const userToSwapWith = queue[swapIndex];
          
          const batch = writeBatch(db);
          batch.update(doc(db, "queues", currentQueueId, "members", userToMove.uid), { timestamp: userToSwapWith.timestamp });
          batch.update(doc(db, "queues", currentQueueId, "members", userToSwapWith.uid), { timestamp: userToMove.timestamp });
          
          try { 
              await batch.commit();
              await addDoc(collection(db, "queues", currentQueueId, "chat"), { 
                  text: `Admin (${userProfile.name.split(' ')[0]}) moveu ${userToMove.name} da posição ${userIndex + 1} para ${swapIndex + 1}.`, 
                  type: "system", 
                  timestamp: serverTimestamp() 
              });
              showToast("Usuário movido.", "info"); 
          } 
          catch(error) { showToast("Erro ao mover usuário.", "error"); }
      }

      window.handleMoveInQueue = handleMoveInQueue;

      function renderQueueView(members) {
        const idx = members.findIndex(m => m.uid === currentUser.uid);
        el("user-position").textContent = idx !== -1 ? idx + 1 : "-";
        el("total-in-queue").textContent = members.length;
        el("header-leave-queue-btn").style.display = idx !== -1 ? "block" : "none";
        
        if (idx !== -1 && el("userObservation") && document.activeElement !== el("userObservation")) {
            el("userObservation").value = members[idx].observation || '';
        }

        el("queue-list").innerHTML = members.length === 0 
          ? `<div class="text-center text-slate-500 py-8 font-medium">A fila está vazia.</div>` 
          : members.map((m, i) => {
          
          const safeName = escapeHTML(m.name || "");
          const safeCourse = escapeHTML(m.course || "");
          
          const avatar = m.photoUrl || `https://placehold.co/100x100/${getThemeHex()}/ffffff?text=${safeName.charAt(0).toUpperCase()}`;
          const borderClass = m.uid === currentUser.uid ? 'border border-primary-500 shadow-md' : 'border border-transparent';
          
          const obsHTML = m.observation ? `<div class="mt-1.5"><span class="inline-block bg-slate-100 dark:bg-[#0f172a] border border-slate-200 dark:border-slate-700 text-[11px] text-slate-600 dark:text-slate-300 px-2 py-1 rounded-lg italic break-words max-w-full">💬 ${escapeHTML(m.observation)}</span></div>` : '';

          let adminControlsHTML = "";
          if (userProfile.role === "superadmin" && m.uid !== currentUser.uid) {
            adminControlsHTML = `<div class="flex-shrink-0 flex gap-2 items-center ml-2">
                <button class="move-queue-btn bg-[#0f172a] w-9 h-9 rounded-xl text-slate-400 hover:text-white flex items-center justify-center" data-uid="${m.uid}" data-direction="up">▲</button>
                <button class="delete-queue-btn bg-red-500/20 w-9 h-9 rounded-xl text-red-500 hover:bg-red-500 hover:text-white flex items-center justify-center" data-uid="${m.uid}" data-name="${safeName}">✕</button>
                <button class="move-queue-btn bg-[#0f172a] w-9 h-9 rounded-xl text-slate-400 hover:text-white flex items-center justify-center" data-uid="${m.uid}" data-direction="down">▼</button>
            </div>`;
          }
          return `<div class="card-style flex items-center gap-3 ${borderClass} mb-3 py-3 px-4">
            <div class="bg-slate-200 dark:bg-[#0f172a] w-12 h-12 rounded-xl flex items-center justify-center font-bold text-lg flex-shrink-0 text-slate-800 dark:text-white">${i+1}</div>
            <img src="${avatar}" class="w-12 h-12 rounded-full object-cover flex-shrink-0 border border-slate-300 dark:border-slate-700">
            <div class="flex-grow min-w-0">
                <p class="font-bold text-sm text-slate-900 dark:text-white truncate">${safeName}</p>
                <p class="text-xs text-slate-500 dark:text-slate-400 truncate">${safeCourse}</p>
                ${obsHTML}
            </div>
            ${adminControlsHTML}
          </div>`}).join("");
        
        document.querySelectorAll('.delete-queue-btn').forEach(b => { 
            b.addEventListener("click", () => { 
                showConfirmModal("Remover da Fila", `Deseja remover ${b.dataset.name}?`, async () => { 
                    await deleteDoc(doc(db, "queues", currentQueueId, "members", b.dataset.uid)); 
                    await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `Admin removeu ${b.dataset.name}.`, type: "system", timestamp: serverTimestamp() }); 
                }); 
            }); 
        });
        document.querySelectorAll('.move-queue-btn').forEach(b => { 
            b.addEventListener("click", () => { 
                window.handleMoveInQueue(b.dataset.uid, b.dataset.direction); 
            }); 
        });
      }

      async function renderQueueList() {
        const list = el("queues-list"); list.innerHTML = "";
        for(const id of (userProfile.joinedQueues || [])) {
          const d = await getDoc(doc(db, "queues", id));
          if(d.exists()) {
            const div = document.createElement("div"); div.className = "card-style cursor-pointer hover:bg-slate-800 transition-colors";
            div.innerHTML = `<h3 class="font-bold text-lg text-white">${escapeHTML(d.data().name)}</h3><p class="text-xs font-semibold text-slate-500 mt-1 uppercase tracking-wider">Código: ${escapeHTML(d.data().code)}</p>`;
            div.onclick = () => enterQueue(id); list.appendChild(div);
          }
        }
      }

      function switchAuthTab(tabName) {
        const loginForm = el("login-form"), registerForm = el("register-form"), btnLogin = el("show-login-tab"), btnRegister = el("show-register-tab");
        btnLogin.className = "flex-1 pb-3 text-center font-bold text-slate-500 border-b-2 border-transparent transition-colors"; btnRegister.className = "flex-1 pb-3 text-center font-bold text-slate-500 border-b-2 border-transparent transition-colors";
        if (tabName === "login") { btnLogin.className = "flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500 transition-colors z-10"; registerForm.style.display = "none"; loginForm.style.display = "block"; } 
        else { btnRegister.className = "flex-1 pb-3 text-center font-bold text-primary-500 border-b-2 border-primary-500 transition-colors z-10"; loginForm.style.display = "none"; registerForm.style.display = "block"; }
      }

      bindClick("login-btn", (e) => { e.preventDefault(); el("loading-section").style.display = "flex"; signInWithEmailAndPassword(auth, el("loginEmail").value, el("loginPassword").value).catch(() => { showToast("E-mail ou senha incorretos", "error"); el("loading-section").style.display = "none"; }); });
      bindClick("register-btn", async (e) => {
        e.preventDefault(); const email = el("registerEmail").value.trim(), pwd = el("registerPassword").value, pwdConfirm = el("registerPasswordConfirm").value, phone = el("registerPhone").value.trim();
        if (pwd !== pwdConfirm) { showToast("As senhas não coincidem.", "error"); return; }
        if (pwd.length < 6) { showToast("A senha deve ter 6 caracteres.", "error"); return; }
        pendingRegistrationPhone = phone; el("loading-section").style.display = "flex";
        try { await createUserWithEmailAndPassword(auth, email, pwd); } catch (error) { showToast("Erro ao criar conta.", "error"); el("loading-section").style.display = "none"; }
      });
      
      bindClick("random-join-btn", async (e) => {
        e.preventDefault();
        const brt = getFormattedTime();
        if (!currentQueueSettings.openTime || !currentQueueSettings.closeTime) { showToast("Fila sem horário.", "error"); return; }
        const currentMinutes = brt.hour * 60 + brt.minute;
        const [oh, om] = currentQueueSettings.openTime.split(":").map(Number);
        const [ch, cm] = currentQueueSettings.closeTime.split(":").map(Number);
        const openMinutes = oh * 60 + om; const closeMinutes = ch * 60 + cm;
        if (currentMinutes < openMinutes || currentMinutes >= closeMinutes) { showToast("A fila está fechada!", "error"); return; }
        el("loading-section").style.display = "flex";
        try {
            await setDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid), { name: userProfile.name, course: userProfile.course, photoUrl: userProfile.photoUrl || "", uid: currentUser.uid, timestamp: serverTimestamp(), observation: "" });
            await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `${userProfile.name} entrou na fila!`, type: "system", timestamp: serverTimestamp() });
        } catch(err) { showToast("Erro ao entrar", "error"); } finally { el("loading-section").style.display = "none"; }
      });

      bindClick("header-leave-queue-btn", (e) => {
        e.preventDefault(); showConfirmModal("Sair da Fila", "Tem certeza que deseja sair?", async () => {
            el("loading-section").style.display = "flex";
            try { await deleteDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid)); await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `${userProfile.name} saiu da fila.`, type: "system", timestamp: serverTimestamp() }); showToast("Você saiu da fila.", "success"); } catch(e) {} finally { el("loading-section").style.display = "none"; }
        });
      });

      bindClick("save-profile-btn", async (e) => {
        e.preventDefault(); const name = el("userName").value.trim(), course = el("userCourse").value.trim(), phone = el("userProfilePhone").value.trim();
        if(!name || !course) { showToast("Nome e Curso são obrigatórios", "error"); return; }
        el("loading-section").style.display = "flex";
        try {
            const photo = tempPhotoDataUrl || userProfile?.photoUrl || `https://placehold.co/200x200/${getThemeHex()}/ffffff?text=${name.charAt(0).toUpperCase()}`;
            const data = { name, course, phone, photoUrl: photo };
            await updateDoc(doc(db, "users", currentUser.uid), data); userProfile = {...userProfile, ...data};
            if (currentQueueId) {
               const memberRef = doc(db, "queues", currentQueueId, "members", currentUser.uid);
               const memberSnap = await getDoc(memberRef);
               if (memberSnap.exists()) await updateDoc(memberRef, { name, course, photoUrl: photo });
               el("header-user-avatar").src = photo; el("profile-overlay").style.display = "none";
            } else { el("profile-overlay").style.display = "none"; showScreen("queueSelection"); renderQueueList(); }
            showToast("Perfil salvo!", "success");
        } catch(e) { showToast("Erro ao salvar a imagem. Tente uma menor.", "error"); } finally { el("loading-section").style.display = "none"; }
      });

      // --- EVENTOS DO HISTÓRICO ---
      bindClick("view-logs-btn", () => { 
        el("logs-modal").style.display = "flex"; 
        const list = el("logs-list");
        setTimeout(() => { list.scrollTop = list.scrollHeight; }, 100);
      });
      bindClick("close-logs-modal", () => { el("logs-modal").style.display = "none"; });

      // --- ENVIO DE OBSERVAÇÃO ---
      bindClick("save-observation-btn", async (e) => {
        e.preventDefault();
        const obsInput = el("userObservation");
        const obsText = obsInput.value.trim();
        try { 
            await updateDoc(doc(db, "queues", currentQueueId, "members", currentUser.uid), { observation: obsText });
            showToast("Observação guardada!", "success"); 
        } 
        catch (err) { showToast("Erro ao guardar observação.", "error"); }
      });

      // --- ENVIO DO CHAT EMBUTIDO ---
      el('chat-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const chatInput = el("chat-input");
        const chatText = chatInput.value.trim();
        if (!chatText) return;
        chatInput.value = "";
        try { 
            await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: chatText, type: "user", sender: userProfile.name, photoUrl: userProfile.photoUrl || "", uid: currentUser.uid, timestamp: serverTimestamp() }); 
        } 
        catch (err) { showToast("Erro ao enviar.", "error"); }
      });

      bindClick("close-profile-btn", () => { if (!userProfile?.name) showToast("Preencha o perfil.", "error"); else el("profile-overlay").style.display = "none"; });
      bindClick("main-logout-btn", () => { 
          localStorage.removeItem("lastQueueId"); 
          clearListeners();
          signOut(auth).then(() => { showScreen("auth"); }); 
      });
      bindClick("back-to-selection-btn", () => { 
          localStorage.removeItem("lastQueueId"); 
          clearListeners();
          showScreen("queueSelection"); 
          renderQueueList(); 
      });
      bindClick("show-login-tab", () => switchAuthTab("login")); bindClick("show-register-tab", () => switchAuthTab("register"));
      bindClick("join-new-queue-btn", () => el("join-queue-modal").style.display = "flex");
      bindClick("cancel-join-queue", () => el("join-queue-modal").style.display = "none");
      bindClick("confirm-join-queue", async () => {
          const code = el("queue-code-input").value.trim().toUpperCase(); if(!code) return;
          el("loading-section").style.display = "flex";
          try {
              const q = query(collection(db, "queues"), where("code", "==", code)); const snap = await getDocs(q);
              if (!snap.empty) {
                  const id = snap.docs[0].id; const joined = userProfile.joinedQueues || [];
                  if (!joined.includes(id)) { joined.push(id); await updateDoc(doc(db, "users", currentUser.uid), { joinedQueues: joined }); }
                  el("join-queue-modal").style.display = "none"; renderQueueList(); showToast("Adicionado!", "success");
              } else showToast("Código inválido", "error");
          } catch(err) { showToast("Erro ao entrar", "error"); } finally { el("loading-section").style.display = "none"; }
      });
      bindClick("edit-profile-btn", () => openProfileModal());
      bindClick("save-schedule-btn", () => updateDoc(doc(db, "queues", currentQueueId), { openTime: el("queueOpenTime").value, closeTime: el("queueCloseTime").value }).then(() => showToast("Horários salvos!", "success")));
      bindClick("restart-queue-btn", () => { showConfirmModal("Zerar Fila", "Deseja esvaziar a fila?", async () => {
              el("loading-section").style.display = "flex";
              try {
                const batch = writeBatch(db); const membersSnap = await getDocs(collection(db, "queues", currentQueueId, "members"));
                membersSnap.docs.forEach(d => batch.delete(d.ref)); await batch.commit();
                await addDoc(collection(db, "queues", currentQueueId, "chat"), { text: `Admin limpou a fila.`, type: "system", timestamp: serverTimestamp() });
              } catch (error) {} finally { el("loading-section").style.display = "none"; }
          });
      });
    </script>
  </body>
</html>
